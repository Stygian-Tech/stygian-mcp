name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
permissions:
  contents: read
jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Checkout atproto-primitives sibling
        uses: actions/checkout@v4
        with:
          repository: Stygian-Tech/atproto-primitives
          path: atproto-primitives
      - name: Link atproto-primitives for local path dependency
        run: |
          if [[ ! -d ../atproto-primitives ]]; then
            ln -s "$GITHUB_WORKSPACE/atproto-primitives" ../atproto-primitives
          fi
      - run: bash scripts/check.sh
