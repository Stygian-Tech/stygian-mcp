name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
permissions:
  contents: read
jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Checkout stygian-core sibling
        uses: actions/checkout@v4
        with:
          repository: Stygian-Tech/stygian-core
          path: stygian-core
      - name: Link stygian-core for local path dependency
        run: |
          if [[ ! -d ../stygian-core ]]; then
            ln -s "$GITHUB_WORKSPACE/stygian-core" ../stygian-core
          fi
      - run: bash scripts/check.sh
